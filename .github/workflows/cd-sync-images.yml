name: CD — Sync GHCR Images

# Queries the GitHub Releases API for each submodule repo, detects version
# drift against what is pinned in docker-compose.yml, and opens one PR per
# service that is out of date.
#
# By default the workflow uses GITHUB_TOKEN.  If the repository setting
# "Allow GitHub Actions to create and approve pull requests" is disabled,
# create a fine-grained PAT with `contents: write` and `pull-requests: write`
# scopes, store it as the Actions secret CD_PAT, and the workflow will
# automatically prefer it for the `gh pr create` step.
#
# Triggers:
#   1. workflow_dispatch — run manually at any time
#   2. schedule          — daily safety-net to catch any missed releases
#   3. pull_request      — fires when a cd/bump-* PR is merged into main;
#                          if all three service images are now current the
#                          submodule pointer PR is opened automatically

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — report drift without opening PRs"
        required: false
        default: false
        type: boolean

  schedule:
    - cron: '0 8 * * 1-5'   # weekdays 08:00 UTC

  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write        # push bump branches
  packages: read         # pull from GHCR to verify images
  pull-requests: write   # open PRs

jobs:
  sync:
    name: Detect drift & open bump PRs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout platform repo
        uses: actions/checkout@v4
        with:
          # Use CD_PAT when available so the workflow can open PRs even
          # when the "Allow GitHub Actions to create PRs" setting is off.
          token: ${{ secrets.CD_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect new releases and open bump PRs
        env:
          # Prefer CD_PAT for PR creation; fall back to GITHUB_TOKEN.
          # If neither can open PRs, a clear error is printed below.
          GH_TOKEN: ${{ secrets.CD_PAT || secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          SERVICES=(vitals-publisher edge-analytics clinician-ui)

          echo "## CD Sync Report — $(date -u +%F)" >> "$GITHUB_STEP_SUMMARY"

          for SERVICE in "${SERVICES[@]}"; do
            REPO="medtech-${SERVICE}"

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### ${REPO}" >> "$GITHUB_STEP_SUMMARY"

            # Latest non-prerelease GitHub Release for this service repo
            LATEST=$(gh api "repos/${OWNER}/${REPO}/releases/latest" \
              --jq '.tag_name' 2>/dev/null || true)

            if [[ -z "$LATEST" ]]; then
              echo "::warning::No release found for ${REPO} — skipping."
              echo "| Status | ⚠️ no release found |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            # Tag currently pinned in docker-compose.yml for this service
            PINNED=$(grep -oP "ghcr\.io/${OWNER}/medtech-${SERVICE}:\K[^\s#]+" \
              docker-compose.yml 2>/dev/null || true)

            echo "| Pinned  | \`${PINNED:-none}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Latest  | \`${LATEST}\` |"       >> "$GITHUB_STEP_SUMMARY"

            if [[ "$PINNED" == "$LATEST" ]]; then
              echo "| Status | ✅ up to date |" >> "$GITHUB_STEP_SUMMARY"
              echo "${SERVICE}: already at ${LATEST} — nothing to do."
              continue
            fi

            # Verify the image is actually available in GHCR before opening a PR
            IMAGE="ghcr.io/${OWNER}/medtech-${SERVICE}:${LATEST}"
            if ! docker pull "${IMAGE}" --quiet 2>/dev/null; then
              echo "::warning::${IMAGE} not yet available in GHCR — skipping."
              echo "| Status | ⚠️ image not in GHCR yet |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            echo "| Status | 🔄 bump available |" >> "$GITHUB_STEP_SUMMARY"

            if [[ "$DRY_RUN" == "true" ]]; then
              echo "${SERVICE}: would bump \`${PINNED:-none}\` → \`${LATEST}\` (dry run)"
              continue
            fi

            BRANCH="cd/bump-${SERVICE}-${LATEST}"

            # Idempotent: skip if a PR is already open for this branch
            EXISTING=$(gh pr list --head "${BRANCH}" --json number \
              --jq '.[0].number // empty')
            if [[ -n "$EXISTING" ]]; then
              PR_URL=$(gh pr view "${EXISTING}" --json url --jq '.url')
              echo "${SERVICE}: PR #${EXISTING} already open — ${PR_URL}"
              echo "| PR | ${PR_URL} (already open) |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            # Create (or reset) the bump branch from the current main.
            # If the branch was pushed in a previous failed run but no PR was
            # opened, the push would be rejected as non-fast-forward.  Deleting
            # the remote branch first makes the operation fully idempotent.
            git push origin --delete "${BRANCH}" 2>/dev/null || true

            git checkout main
            git checkout -b "${BRANCH}"

            sed -i \
              "s|ghcr\.io/${OWNER}/medtech-${SERVICE}:[^[:space:]#]*|ghcr.io/${OWNER}/medtech-${SERVICE}:${LATEST}|g" \
              docker-compose.yml

            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docker-compose.yml
            git commit -m "chore(cd): bump medtech-${SERVICE} → ${LATEST}"
            git push origin "${BRANCH}"

            # Diagnose which token is in use before attempting PR creation.
            if [[ -n "${{ secrets.CD_PAT }}" ]]; then
              echo "${SERVICE}: using CD_PAT for PR creation"
            else
              echo "${SERVICE}: CD_PAT secret not set — falling back to GITHUB_TOKEN"
              echo "::warning::CD_PAT is not configured. If PR creation fails, either add the secret or enable 'Allow GitHub Actions to create and approve pull requests' in Settings → Actions → General."
            fi

            PR_STDERR=$(mktemp)
            PR_BODY_FILE=$(mktemp)
            printf '%s\n' \
              "## Automated version bump" \
              "" \
              "| Field        | Value |" \
              "|--------------|-------|" \
              "| Service      | \`medtech-${SERVICE}\` |" \
              "| Previous     | \`${PINNED:-none}\` |" \
              "| New version  | \`${LATEST}\` |" \
              "| Image        | \`${IMAGE}\` |" \
              "" \
              "### What this PR does" \
              "Pins \`docker-compose.yml\` to the latest GHCR image for this service." \
              "The **Integration Tests** workflow runs automatically on this PR." \
              "" \
              "### Merge checklist" \
              "- [ ] Integration tests are green" \
              "- [ ] No regressions in service logs" \
              "- [ ] Version bump is intentional (not a pre-release)" \
              "" \
              "> Opened automatically by the CD sync pipeline." \
              > "$PR_BODY_FILE"

            PR_URL=$(gh pr create \
              --base main \
              --head "${BRANCH}" \
              --title "chore(cd): bump medtech-${SERVICE} → ${LATEST}" \
              --body-file "${PR_BODY_FILE}" 2>"$PR_STDERR") || {
              echo "::error::PR creation failed for medtech-${SERVICE}. GitHub said:"
              echo "::error::$(cat "$PR_STDERR")"
              echo "::error::Fix option A — repo setting: Settings → Actions → General → enable 'Allow GitHub Actions to create and approve pull requests'."
              echo "::error::Fix option B — PAT: create a fine-grained PAT with contents:write + pull-requests:write scopes and store it as the secret CD_PAT."
              rm -f "$PR_STDERR" "$PR_BODY_FILE"
              exit 1
            }
            rm -f "$PR_STDERR" "$PR_BODY_FILE"

            echo "| PR | ${PR_URL} |" >> "$GITHUB_STEP_SUMMARY"
            echo "${SERVICE}: opened ${PR_URL}"

            # Return to main before processing the next service
            git checkout main
          done

  bump-submodules:
    name: Bump submodule pointers to latest main
    runs-on: ubuntu-latest
    # Only triggered when a cd/bump-* PR is merged into main.
    # The gate step then checks whether all three service images are current
    # before opening the submodule PR — so partial merges are safe.
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'cd/bump-')

    steps:
      - name: Checkout platform repo with submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CD_PAT || secrets.GITHUB_TOKEN }}
          submodules: recursive
          fetch-depth: 0

      - name: Gate — check all service images are up to date
        id: gate
        env:
          GH_TOKEN: ${{ secrets.CD_PAT || secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          SERVICES=(vitals-publisher edge-analytics clinician-ui)
          ALL_CURRENT=true

          echo "## Submodule gate check — $(date -u +%F)" >> "$GITHUB_STEP_SUMMARY"

          for SERVICE in "${SERVICES[@]}"; do
            REPO="medtech-${SERVICE}"

            LATEST=$(gh api "repos/${OWNER}/${REPO}/releases/latest" \
              --jq '.tag_name' 2>/dev/null || true)

            if [[ -z "$LATEST" ]]; then
              echo "::warning::No release found for ${REPO} — treating as not current."
              echo "| ${SERVICE} | ⚠️ no release found |" >> "$GITHUB_STEP_SUMMARY"
              ALL_CURRENT=false
              break
            fi

            PINNED=$(grep -oP "ghcr\.io/${OWNER}/medtech-${SERVICE}:\K[^\s#]+" \
              docker-compose.yml 2>/dev/null || true)

            if [[ "$PINNED" != "$LATEST" ]]; then
              echo "${SERVICE}: pinned=${PINNED:-none} latest=${LATEST} — still waiting."
              echo "| ${SERVICE} | ⏳ waiting (pinned \`${PINNED:-none}\`, latest \`${LATEST}\`) |" >> "$GITHUB_STEP_SUMMARY"
              ALL_CURRENT=false
              break
            fi

            echo "${SERVICE}: ✅ pinned at ${LATEST}"
            echo "| ${SERVICE} | ✅ \`${LATEST}\` |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "all_current=${ALL_CURRENT}" >> "$GITHUB_OUTPUT"

          if [[ "$ALL_CURRENT" == "true" ]]; then
            echo "All services are current — proceeding to submodule bump."
          else
            echo "Not all services are current — submodule bump skipped."
          fi

      - name: Advance submodule pointers to latest main
        if: steps.gate.outputs.all_current == 'true'
        id: submodules
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git submodule update --remote --merge

          if git diff --quiet HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "All submodule pointers are already at latest main — nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open submodule bump PR
        if: steps.gate.outputs.all_current == 'true' && steps.submodules.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.CD_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BRANCH="cd/bump-submodules-$(date -u +%Y%m%d)"

          # Idempotent: skip if a PR is already open for this branch
          EXISTING=$(gh pr list --head "${BRANCH}" --json number --jq '.[0].number // empty')
          if [[ -n "$EXISTING" ]]; then
            PR_URL=$(gh pr view "${EXISTING}" --json url --jq '.url')
            echo "Submodule bump PR already open — ${PR_URL}"
            echo "| PR | ${PR_URL} (already open) |" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git push origin --delete "${BRANCH}" 2>/dev/null || true
          git checkout -b "${BRANCH}"
          git add .
          git commit -m "chore(cd): bump submodule pointers to latest main"
          git push origin "${BRANCH}"

          # Build a per-submodule summary of the new HEAD SHAs
          SUBMODULE_ROWS=""
          while IFS= read -r line; do
            SHA=$(echo "$line" | awk '{print $2}')
            SUB_PATH=$(echo "$line" | awk '{print $3}')
            SUBMODULE_ROWS+="| \`${SUB_PATH}\` | \`${SHA:0:8}\` |"$'\n'
          done < <(git submodule status)

          PR_BODY_FILE=$(mktemp)
          printf '%s\n' \
            "## Automated submodule pointer bump" \
            "" \
            "All three service images are pinned to their latest releases." \
            "This PR advances each submodule pointer to the current HEAD of its \`main\` branch." \
            "" \
            "### Submodule changes" \
            "| Submodule | New HEAD (short SHA) |" \
            "|-----------|----------------------|" \
            "${SUBMODULE_ROWS}" \
            "" \
            "### Merge checklist" \
            "- [ ] Submodule changes are intentional" \
            "- [ ] CI is green" \
            "" \
            "> Opened automatically after all three compose image bump PRs were merged." \
            > "$PR_BODY_FILE"

          PR_URL=$(gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore(cd): bump submodule pointers to latest main" \
            --body-file "${PR_BODY_FILE}")
          rm -f "$PR_BODY_FILE"

          echo "Opened submodule bump PR: ${PR_URL}"
          echo "| Submodule PR | ${PR_URL} |" >> "$GITHUB_STEP_SUMMARY"


