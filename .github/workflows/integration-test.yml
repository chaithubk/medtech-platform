name: Integration Tests - Complete System

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  integration-test:
    name: Docker Compose Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Images
        run: |
          echo "🔨 Building Docker images..."
          docker compose build --no-cache

      - name: Start Services
        run: |
          echo "🚀 Starting docker-compose..."
          docker compose up -d
          sleep 10

      - name: Check Services Health
        run: |
          echo "🏥 Checking services..."
          docker compose ps

      - name: Test MQTT Connection
        run: |
          echo "🔌 Testing MQTT..."
          docker run --rm --network medtech-platform_medtech-network \
            library/alpine:latest \
            sh -c "apk add mosquitto-clients && mosquitto_sub -h vitals-publisher -t 'test' -W 1" || true

      - name: Test Vitals Flow
        run: |
          echo "📊 Testing vitals flow..."
          sleep 5
          docker run --rm --network medtech-platform_medtech-network \
            library/alpine:latest \
            sh -c "apk add mosquitto-clients && timeout 10 mosquitto_sub -h vitals-publisher -t 'medtech/vitals/latest' -W 1" || true

      - name: Test Predictions Flow
        run: |
          echo "🧠 Testing predictions flow..."
          sleep 10
          docker run --rm --network medtech-platform_medtech-network \
            library/alpine:latest \
            sh -c "apk add mosquitto-clients && timeout 10 mosquitto_sub -h vitals-publisher -t 'medtech/predictions/sepsis' -W 1" || true

      - name: View Logs
        if: always()
        run: |
          echo "📋 Service Logs:"
          docker compose logs || true

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v || true

  docker-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Images
        run: |
          docker compose build

      - name: List Images
        run: |
          docker images | grep medtech || true

  ci-status:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [integration-test, docker-validation]
    if: always()
    
    steps:
      - name: Report Status
        run: |
          echo "📊 CI Pipeline Complete"
          echo "======================================"
          echo "Integration Test: ${{ needs.integration-test.result }}"
          echo "Docker Validation: ${{ needs.docker-validation.result }}"
          echo "======================================"
          
          if [ "${{ needs.integration-test.result }}" = "success" ]; then
            echo "✅ Integration tests PASSED"
          else
            echo "⚠️  Integration tests DID NOT PASS"
          fi
          
          if [ "${{ needs.docker-validation.result }}" = "success" ]; then
            echo "✅ Docker validation PASSED"
          else
            echo "⚠️  Docker validation DID NOT PASS"
          fi
