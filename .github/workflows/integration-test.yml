name: Integration Tests - Complete System

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  integration-test:
    name: Docker Compose Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Images
        run: |
          echo "🔨 Building Docker images..."
          docker compose build --no-cache

      - name: Start Services
        run: |
          echo "🚀 Starting docker-compose..."
          docker compose up -d
          # Wait for vitals-publisher healthcheck to pass
          echo "⏳ Waiting for vitals-publisher to become healthy..."
          timeout 60 sh -c 'until [ "$(docker inspect --format="{{.State.Health.Status}}" vitals-publisher)" = "healthy" ]; do sleep 2; done'
          echo "✅ vitals-publisher is healthy"

      - name: Check Services Health
        run: |
          echo "🏥 Checking services..."
          docker compose ps

      - name: Test MQTT Broker Reachability
        run: |
          echo "🔌 Testing MQTT broker reachability..."
          # Verify the broker accepts connections (mosquitto_pub exits 0 on success)
          docker run --rm --network medtech-platform_medtech-network \
            --entrypoint mosquitto_pub \
            eclipse-mosquitto:2 \
            -h vitals-publisher -p 1883 -t 'medtech/ci/probe' -m 'ping'
          echo "✅ MQTT broker is reachable"

      - name: Test Vitals Flow
        run: |
          echo "📊 Testing vitals publisher → MQTT message flow..."
          # Publisher interval is 10s; wait up to 25s for exactly 1 message then exit.
          # -C 1 exits after receiving one message; no || true so failure = real failure.
          docker run --rm --network medtech-platform_medtech-network \
            --entrypoint mosquitto_sub \
            eclipse-mosquitto:2 \
            -h vitals-publisher -p 1883 \
              -t 'medtech/vitals/latest' \
              -C 1 -W 25
          echo "✅ Vitals message received from publisher"

      - name: Test Predictions Flow
        run: |
          echo "🧠 Testing edge-analytics → predictions message flow..."
          # edge-analytics needs to buffer several readings before scoring;
          # wait up to 60s for 1 prediction message.
          docker run --rm --network medtech-platform_medtech-network \
            --entrypoint mosquitto_sub \
            eclipse-mosquitto:2 \
            -h vitals-publisher -p 1883 \
              -t 'medtech/predictions/sepsis' \
              -C 1 -W 60
          echo "✅ Prediction message received from edge-analytics"

      - name: Verify Edge Analytics Logs
        run: |
          echo "📋 edge-analytics received vitals and published predictions:"
          docker compose logs edge-analytics | grep -E "received|predict|publish|score|sepsis" || \
            (echo "❌ No relevant log lines found in edge-analytics" && docker compose logs edge-analytics && exit 1)

      - name: View All Logs
        if: always()
        run: |
          echo "📋 Service Logs:"
          docker compose logs vitals-publisher
          docker compose logs edge-analytics

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v || true

  docker-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Images
        run: |
          docker compose build

      - name: List Images
        run: |
          docker images | grep medtech || true

  ci-status:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [integration-test, docker-validation]
    if: always()
    
    steps:
      - name: Report Status
        run: |
          echo "📊 CI Pipeline Complete"
          echo "======================================"
          echo "Integration Test: ${{ needs.integration-test.result }}"
          echo "Docker Validation: ${{ needs.docker-validation.result }}"
          echo "======================================"
          
          if [ "${{ needs.integration-test.result }}" = "success" ]; then
            echo "✅ Integration tests PASSED"
          else
            echo "⚠️  Integration tests DID NOT PASS"
          fi
          
          if [ "${{ needs.docker-validation.result }}" = "success" ]; then
            echo "✅ Docker validation PASSED"
          else
            echo "⚠️  Docker validation DID NOT PASS"
          fi
